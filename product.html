    <header class="site-header">

        </button>
    </header>

    <main id="main-content">
        <div id="productLoading" class="product-loading" aria-live="polite">
            <div class="skeleton skeleton-card">
                <div class="skeleton skeleton-image"></div>
                <div class="product-info">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-price"></div>
                    <div class="skeleton skeleton-btn"></div>
                    <div class="skeleton skeleton-btn"></div>
                </div>
            </div>
        </div>

        <article id="productDetail" class="product-detail" hidden>
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <ol>
                    <li><a href="/">Home</a></li>
                    <li><a href="/catalog">Catalog</a></li>
                    <li><span id="breadcrumbCategory"></span></li>
                    <li><span id="breadcrumbName"></span></li>
                </ol>
            </nav>

            <div class="product-gallery">
                <div class="main-image-wrapper">
                    <img id="mainImage" src="" alt="" class="main-image" fetchpriority="high" loading="eager">
                </div>
            </div>

            <div class="product-meta">
                <span id="productCategory" class="product-category"></span>
                <h1 id="productName" class="product-name"></h1>
                <div id="productBadges" class="product-badges"></div>
                <p id="productDescription" class="product-description"></p>
                <div class="product-price-row">
                    <span id="productPrice" class="product-price" translate="no"></span>
                    <div class="product-likes" id="productLikes" role="button" tabindex="0" aria-label="Like this product">
                        <span class="like-icon">&#x1F499;</span>
                        <span class="like-count">0</span>
                    </div>
                </div>
            </div>

            <div class="product-actions">
                <h2>Buy from Verified Agents</h2>
                <div id="agentLinks" class="agent-links"></div>
            </div>

            <section class="product-specs">
                <h2>Details</h2>
                <dl id="productSpecs" class="specs-list"></dl>
            </section>

            <section class="related-section">
                <h2>You May Also Like</h2>
                <div id="relatedProducts" class="related-grid"></div>
            </section>
        </article>
    </main>

    <div id="footer-placeholder"></div>
